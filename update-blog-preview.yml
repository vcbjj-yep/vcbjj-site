name: Update Blog Preview on Homepage

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**'

jobs:
  update-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --save-dev node-html-parser

      - name: Build blog preview
        run: node .github/scripts/update-blog-preview.js

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: auto-update blog preview [skip ci]"
          git push
